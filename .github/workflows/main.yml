name: 打包仓库文件并上传

on:
  workflow_dispatch:
    # 手动触发时可自定义版本号（选填，默认自动生成）
    inputs:
      release_version:
        description: 'Release版本号（如v1.0.0）'
        required: false
        default: 'v${{ github.run_id }}'
  # push:
  #   branches: [ main ]
  release:
    types: [created]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      # 显式授予Release操作权限（核心修复）
      contents: write
      
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 打包仓库文件
        run: |
          PACKAGE_NAME="仓库文件_$(date +%Y%m%d_%H%M%S).zip"
          zip -r $PACKAGE_NAME . -x ".git/*" ".github/*" "*.gitignore"
          echo "PACKAGE_PATH=$(pwd)/$PACKAGE_NAME" >> $GITHUB_ENV
          ls -lh $PACKAGE_NAME

      - name: 上传打包文件到Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 仓库打包文件_${{ github.run_id }}
          path: ${{ env.PACKAGE_PATH }}
          retention-days: 30

      # 步骤1：手动触发时创建Release
      - name: 手动触发-创建Release
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          release_name: 手动打包_${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false

      # 步骤2：统一附加文件到Release（兼容手动/Release触发）
      - name: 附加文件到Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version || github.ref_name }}
          files: ${{ env.PACKAGE_PATH }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
