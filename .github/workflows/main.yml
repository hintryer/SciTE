name: 打包仓库文件并上传

on:
  workflow_dispatch:
    # 手动触发时自定义版本号（默认值改为固定占位符，后续步骤自动生成）
    inputs:
      release_version:
        description: 'Release版本号（如v1.0.0，留空则自动生成）'
        required: false
        default: ''  # 移除github.run_id表达式，改为空值
  release:
    types: [created]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予Release操作权限
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 打包仓库文件
        run: |
          PACKAGE_NAME="仓库文件_$(date +%Y%m%d_%H%M%S).zip"
          zip -r $PACKAGE_NAME . -x ".git/*" ".github/*" "*.gitignore"
          echo "PACKAGE_PATH=$(pwd)/$PACKAGE_NAME" >> $GITHUB_ENV
          ls -lh $PACKAGE_NAME

      - name: 上传打包文件到Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 仓库打包文件_${{ github.run_id }}
          path: ${{ env.PACKAGE_PATH }}
          retention-days: 30

      # 步骤1：生成动态版本号（解决inputs默认值不能用表达式的问题）
      - name: 生成Release版本号
        id: gen_version
        run: |
          # 如果手动触发时没填版本号，用运行ID生成；否则用输入的版本号
          if [ -z "${{ github.event.inputs.release_version }}" ]; then
            VERSION="v${{ github.run_id }}"
          else
            VERSION="${{ github.event.inputs.release_version }}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      # 步骤2：手动触发时创建Release
      - name: 手动触发-创建Release
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          release_name: 手动打包_${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: false

      # 步骤3：统一附加文件到Release
      - name: 附加文件到Release
        uses: softprops/action-gh-release@v2
        with:
          # 手动触发用生成的版本号，Release触发用原Tag
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.RELEASE_VERSION || github.ref_name }}
          files: ${{ env.PACKAGE_PATH }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
